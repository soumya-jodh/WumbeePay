spring:
  application:
    name: razorpay

  datasource:
    url: jdbc:postgresql://localhost:5432/razorpayDb
    username: "username-here"
    password: "your-pass-here"

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

